name: Rust Publish

on:
  push:
    branches:
      - 'rust-v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting (hmll-sys)
        run: cargo fmt --manifest-path lib/rust/hmll-sys/Cargo.toml --check

      - name: Check formatting (hmll)
        run: cargo fmt --manifest-path lib/rust/hmll/Cargo.toml --check

  clippy-vendored:
    name: Clippy (vendored)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Clippy (hmll-sys)
        run: cargo clippy --manifest-path lib/rust/hmll-sys/Cargo.toml -- -D warnings

      - name: Clippy (hmll)
        run: cargo clippy --manifest-path lib/rust/hmll/Cargo.toml -- -D warnings

  clippy-system:
    name: Clippy (system)
    runs-on: ubuntu-latest
    env:
      CC: gcc
      CXX: g++
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Build and install C library
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DHMLL_BUILD_STATIC=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build --parallel
          sudo cmake --install build

      - name: Clippy (hmll-sys, system linking)
        run: cargo clippy --manifest-path lib/rust/hmll-sys/Cargo.toml --no-default-features -- -D warnings
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig

      - name: Clippy (hmll, system linking)
        run: cargo clippy --manifest-path lib/rust/hmll/Cargo.toml --no-default-features -- -D warnings
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig

  # Uncomment when documentation is ready
  # docs:
  #   name: Documentation
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #
  #     - uses: dtolnay/rust-toolchain@stable
  #
  #     - name: Install dependencies
  #       run: sudo apt-get update && sudo apt-get install -y libclang-dev
  #
  #     - name: Build docs (hmll-sys)
  #       run: cargo doc --manifest-path lib/rust/hmll-sys/Cargo.toml --no-deps --all-features
  #       env:
  #         RUSTDOCFLAGS: -D warnings
  #
  #     - name: Build docs (hmll)
  #       run: cargo doc --manifest-path lib/rust/hmll/Cargo.toml --no-deps --all-features
  #       env:
  #         RUSTDOCFLAGS: -D warnings

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [fmt, clippy-vendored, clippy-system]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry-run)
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Publish hmll-sys
        # --no-verify: vendored build relies on C sources outside the crate directory
        run: cargo publish --manifest-path lib/rust/hmll-sys/Cargo.toml --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish hmll
        # --no-verify: depends on hmll-sys which needs the full source tree
        run: cargo publish --manifest-path lib/rust/hmll/Cargo.toml --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    needs: [fmt, clippy-vendored, clippy-system]
    if: github.event_name == 'workflow_dispatch' && inputs.dry-run
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Dry run publish hmll-sys
        # --no-verify: vendored build relies on C sources outside the crate directory
        run: cargo publish --manifest-path lib/rust/hmll-sys/Cargo.toml --dry-run --no-verify

      - name: Dry run publish hmll
        # --no-verify: depends on hmll-sys which needs the full source tree
        run: cargo publish --manifest-path lib/rust/hmll/Cargo.toml --dry-run --no-verify

