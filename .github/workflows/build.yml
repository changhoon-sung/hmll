name: HMLL Build Workflow

on:
  workflow_call:
    inputs:
      os:
        description: 'Operating system to run on'
        required: true
        type: string
      compiler-cc:
        description: 'C compiler (default: gcc on Linux, clang on macOS, auto on Windows)'
        required: false
        type: string
      compiler-cxx:
        description: 'C++ compiler (default: g++ on Linux, clang++ on macOS, auto on Windows)'
        required: false
        type: string
      build-type:
        description: 'CMake build type'
        type: string
        default: 'Debug'
      static-build:
        description: 'Build static library'
        type: boolean
        default: false
      enable-cuda:
        type: boolean
        default: false
      enable-python:
        type: boolean
        default: false
      enable-rust:
        type: boolean
        default: false
      enable-sanitizers:
        type: boolean
        default: false
      enable-safetensors:
        type: boolean
        default: true
      run-tests:
        type: boolean
        default: true
      cuda-version:
        type: string
        default: '12.2.0'
      python-version:
        type: string
        default: '3.11'
      rust-toolchain:
        type: string
        default: 'stable'

jobs:
  build:
    runs-on: ${{ inputs.os }}

    # Smart compiler defaults: explicit input > platform default
    # Windows: don't set CC/CXX, let CMake auto-detect MSVC
    env:
      CC: ${{ inputs.compiler-cc || (contains(inputs.os, 'macos') && 'clang' || (contains(inputs.os, 'ubuntu') && 'gcc' || '')) }}
      CXX: ${{ inputs.compiler-cxx || (contains(inputs.os, 'macos') && 'clang++' || (contains(inputs.os, 'ubuntu') && 'g++' || '')) }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup CUDA
        if: inputs.enable-cuda
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ inputs.cuda-version }}
          method: 'network'
          sub-packages: '["nvcc"]'

      - name: Setup Python
        if: inputs.enable-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Setup Rust
        if: inputs.enable-rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Install Python dependencies
        if: inputs.enable-python
        shell: bash
        run: pip install pytest numpy

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ inputs.build-type }} \
            -DHMLL_BUILD_STATIC=${{ inputs.static-build && 'ON' || 'OFF' }} \
            -DHMLL_BUILD_TESTS=${{ inputs.run-tests && 'ON' || 'OFF' }} \
            -DHMLL_ENABLE_SANITIZERS=${{ inputs.enable-sanitizers && 'ON' || 'OFF' }} \
            -DHMLL_ENABLE_SAFETENSORS=${{ inputs.enable-safetensors && 'ON' || 'OFF' }} \
            ${{ inputs.enable-cuda && '-DHMLL_ENABLE_CUDA=ON' || '' }} \
            ${{ inputs.enable-python && '-DHMLL_ENABLE_PYTHON=ON' || '' }}

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ inputs.build-type }} --parallel

      - name: Test C++ Library
        if: inputs.run-tests
        shell: bash
        working-directory: build
        run: ctest -C ${{ inputs.build-type }} --output-on-failure

      - name: Build Rust Bindings
        if: inputs.enable-rust
        shell: bash
        working-directory: lib/rust/hmll
        run: cargo build --release ${{ inputs.enable-safetensors && '--features safetensors' || '' }}

      - name: Test Rust Bindings
        if: inputs.enable-rust && inputs.run-tests
        shell: bash
        working-directory: lib/rust/hmll
        run: cargo test ${{ inputs.enable-safetensors && '--features safetensors' || '' }}

      - name: Test Python Bindings
        if: inputs.enable-python && inputs.run-tests
        shell: bash
        run: |
          python examples/read_with_hmll.py || echo "TODO: Add proper Python test suite"
