name: HMLL Build Workflow
on:
  workflow_call:
    inputs:
      os:
        description: 'Operating system to run on'
        required: true
        type: string
      compiler-cc:
        description: 'C compiler (default: gcc on Linux, clang on macOS, auto on Windows)'
        required: false
        type: string
      compiler-cxx:
        description: 'C++ compiler (default: g++ on Linux, clang++ on macOS, auto on Windows)'
        required: false
        type: string
      build-type:
        description: 'CMake build type'
        type: string
        default: 'Debug'
      static-build:
        description: 'Build static library'
        type: boolean
        default: false
      enable-cuda:
        type: boolean
        default: false
      enable-python:
        type: boolean
        default: false
      enable-rust:
        type: boolean
        default: false
      enable-sanitizers:
        type: boolean
        default: false
      enable-safetensors:
        type: boolean
        default: true
      run-tests:
        type: boolean
        default: true
      cuda-version:
        type: string
        default: '13.1.0'
      python-version:
        type: string
        default: '3.12'
      rust-toolchain:
        type: string
        default: 'stable'

jobs:
  build:
    runs-on: ${{ inputs.os }}
    env:
      CC: ${{ inputs.compiler-cc }}
      CXX: ${{ inputs.compiler-cxx }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup CUDA
        if: inputs.enable-cuda
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ inputs.cuda-version }}
          method: 'network'
          sub-packages: ${{ runner.os == 'Windows' && '[]' || '["nvcc", "cudart"]' }}

      - name: Setup Python
        if: inputs.enable-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Rust
        if: inputs.enable-rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          cache: true

      - name: Install Python dependencies
        if: inputs.enable-python
        run: pip install pytest numpy

      - name: Configure CMake
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ inputs.build-type }} \
            -DHMLL_BUILD_STATIC=${{ inputs.static-build && 'ON' || 'OFF' }} \
            -DHMLL_BUILD_TESTS=${{ inputs.run-tests && 'ON' || 'OFF' }} \
            -DHMLL_ENABLE_SANITIZERS=${{ inputs.enable-sanitizers && 'ON' || 'OFF' }} \
            -DHMLL_ENABLE_SAFETENSORS=${{ inputs.enable-safetensors && 'ON' || 'OFF' }} \
            ${{ inputs.enable-cuda && '-DHMLL_ENABLE_CUDA=ON' || '' }} \
            ${{ inputs.enable-python && '-DHMLL_ENABLE_PYTHON=ON' || '' }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=${{ inputs.build-type }} `
            -DHMLL_BUILD_STATIC=${{ inputs.static-build && 'ON' || 'OFF' }} `
            -DHMLL_BUILD_TESTS=${{ inputs.run-tests && 'ON' || 'OFF' }} `
            -DHMLL_ENABLE_SANITIZERS=${{ inputs.enable-sanitizers && 'ON' || 'OFF' }} `
            -DHMLL_ENABLE_SAFETENSORS=ON `
            ${{ inputs.enable-cuda && '-DHMLL_ENABLE_CUDA=ON' || '' }} `
            ${{ inputs.enable-python && '-DHMLL_ENABLE_PYTHON=ON' || '' }}

      - name: Build
        run: cmake --build build --config ${{ inputs.build-type }} --parallel

      - name: Test C++ Library
        if: inputs.run-tests
        working-directory: build
        run: ctest -C ${{ inputs.build-type }} --output-on-failure

      - name: Build Rust
        if: inputs.enable-rust
        working-directory: lib/rust/hmll
        run: cargo build --release ${{ inputs.enable-safetensors && '--features safetensors' || '' }}

      - name: Test Rust Bindings
        if: inputs.enable-rust && inputs.run-tests
        shell: bash
        working-directory: lib/rust/hmll
        run: cargo test ${{ inputs.enable-safetensors && '--features safetensors' || '' }}